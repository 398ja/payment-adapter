spring.application.name=cashu-gateway-rest
server.port=${SERVER_PORT:8080}

#spring.datasource.url=jdbc:postgresql://dbserver/gateway
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/gateway}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER:org.postgresql.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:gateway}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:gateway}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

server.address=${SERVER_ADDRESS:0.0.0.0}
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.defaults.enabled=true
