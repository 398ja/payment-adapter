# Cash Gateway Configuration

# Default invoice expiry in seconds (5 minutes)
cash.default.expiry=300

# Default relay URLs (comma-separated)
cash.default.relays=wss://relay.damus.io,wss://nos.lol

# Proof code length (4-6 digits recommended)
cash.proof.length=4

# Event Subscriber Configuration
cash.subscriber.enabled=true

# Interval for checking expired invoices (milliseconds)
cash.subscriber.expiry-check-interval=30000
