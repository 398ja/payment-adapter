services:
    payment-adapter-db:
        build: ./docker/postgres
        ports:
            - "5432:5432"
    payment-adapter-rest:
        build:
            context: .
            dockerfile: payment-adapter-rest/Dockerfile
        depends_on:
            - payment-adapter-db
            - payment-adapter-webhook
        ports:
            - "${PAYMENT_ADAPTER_PORT:-8080}:${PAYMENT_ADAPTER_PORT:-8080}"
        environment:
            PAYMENT_ADAPTER_PORT: ${PAYMENT_ADAPTER_PORT:-8080}
            SPRING_DATASOURCE_URL: jdbc:postgresql://payment-adapter-db:5432/payment-adapter
            SPRING_DATASOURCE_USERNAME: postgres
            SPRING_DATASOURCE_PASSWORD: password
            WEBHOOK_BASE_URL: http://payment-adapter-webhook:8080/webhook
    payment-adapter-webhook:
        build:
            context: .
            dockerfile: payment-adapter-webhook/Dockerfile
        environment:
            # Let the servlet contact the REST API inside the Compose network
            CATALINA_OPTS: -Dgateway.api.base_url=http://payment-adapter-rest:8080
        ports:
            - "${WEBHOOK_PORT:-9090}:8080"
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
            interval: 10s
            timeout: 3s
            retries: 5
            start_period: 20s
    phoenixd:
        image: acinq/phoenixd:latest
        ports:
            - "9740:9740"
