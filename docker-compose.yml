version: '3.8'
services:
  gateway-rest:
    build:
      context: .
      dockerfile: cashu-gateway-rest/Dockerfile
    image: cashu-gateway-rest:latest
    container_name: cashu-gateway-rest
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:h2:tcp://h2db:1521/mem:gateway;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: password
    depends_on:
      - h2db
  h2db:
    image: oscarfonts/h2:latest
    container_name: h2-database
    ports:
      - "1521:1521"
      - "81:81"
    volumes:
      - h2data:/opt/h2-data
volumes:
  h2data:
