# E2E test configuration
spring.main.allow-bean-definition-overriding=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.flyway.enabled=true

# Disable cash subscriber (connects to relays)
cash.subscriber.enabled=false
cash.default.expiry=300
cash.default.relays=wss://relay.test.local
cash.proof.length=4

# High rate limit for general tests (CashRateLimitE2ETest uses its own limiter)
cash.ratelimit.invoices-per-hour=1000

# Logging
logging.level.org.testcontainers=INFO
logging.level.xyz.tcheeric=DEBUG
logging.level.org.hibernate.SQL=WARN
