# Mint Webhook Forwarder Configuration
# These properties can be overridden via environment variables

# Enable/disable forwarding to mint
mint.webhook.enabled=${MINT_WEBHOOK_ENABLED:true}

# Mint webhook endpoint URL
mint.webhook.url=${MINT_WEBHOOK_URL:http://localhost:7777/webhook/payment}

# HMAC secret for webhook signature (empty = no signature)
mint.webhook.secret=${MINT_WEBHOOK_SECRET:}

# Request timeout in milliseconds
mint.webhook.timeout-ms=${MINT_WEBHOOK_TIMEOUT:5000}

# Retry configuration
mint.webhook.retry.max-attempts=${MINT_WEBHOOK_RETRY_MAX:3}
mint.webhook.retry.initial-delay-ms=${MINT_WEBHOOK_RETRY_DELAY:1000}
mint.webhook.retry.multiplier=${MINT_WEBHOOK_RETRY_MULTIPLIER:2.0}
