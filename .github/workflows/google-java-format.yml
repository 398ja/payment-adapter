name: Format

on:
  pull_request:
    branches:
      - develop
      - master

permissions:
  contents: write

jobs:

  formatting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5 # v2 minimum required
      - uses: axel-op/googlejavaformat-action@v4
        with:
          args: "--replace"
          # Recommended if you use MacOS:
          github-token: ${{ secrets.GITHUB_TOKEN }}
